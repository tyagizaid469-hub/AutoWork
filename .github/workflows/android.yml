name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle Build Tool
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.2

    - name: Download fresh gradle wrapper
      run: |
        rm -f gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar
        mkdir -p gradle/wrapper
        curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradlew -o gradlew
        curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradlew.bat -o gradlew.bat
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK (Optional)
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk-builds
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Check Build Status
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ Debug APK built successfully!"
          ls -lh app/build/outputs/apk/debug/*.apk
        else
          echo "❌ Debug APK build failed!"
          exit 1
        fi
